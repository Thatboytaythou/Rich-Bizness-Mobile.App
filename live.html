<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <title>Live Studio • Rich Bizness Mobile</title>
  <meta name="theme-color" content="#050805" />

  <link rel="stylesheet" href="/styles/base.css" />
  <link rel="stylesheet" href="/styles/omni-fx.css" />
  <link rel="stylesheet" href="/styles/live.css" />
</head>

<body class="rb-live-page live-body rb-live-hologram-page">
  <div class="rb-bg-layer" aria-hidden="true"></div>
  <div class="rb-bg-grid" aria-hidden="true"></div>
  <div class="rb-bg-vignette" aria-hidden="true"></div>
  <div class="rb-bg-noise" aria-hidden="true"></div>
  <div class="rb-fx-smoke" aria-hidden="true"></div>

  <main class="live-holo-shell">
    <header class="live-holo-top">
      <a class="live-brand" href="/">
        <span>LIVE STUDIO</span>
        <strong>RICH BIZNESS</strong>
        <small>LLC</small>
      </a>

      <a id="watchLink" class="live-watch-link" href="/watch">WATCH</a>
    </header>

    <section class="holo-tv-wrap">
      <div class="holo-tv">
        <div class="holo-tv-glass"></div>

        <video id="localVideo" autoplay muted playsinline></video>
        <div id="remoteVideos" class="remote-videos cohost-hologram"></div>

        <div id="stageEmpty" class="stage-empty holo-empty">
          Create a stream, then press WE LIT 🔥.
        </div>

        <div id="reactionLayer" class="reaction-layer"></div>

        <div class="we-lit-float">
          WE LIT 🔥
        </div>

        <div class="holo-room-info">
          <p>LIVEKIT ROOM</p>
          <h1 id="stageTitle">No stream created</h1>
          <div id="liveBadge" class="live-badge off">OFF AIR</div>
        </div>
      </div>
    </section>

    <section class="live-control-dock">
      <button id="createStreamBtn" type="button">Create</button>
      <button id="startLiveBtn" type="button" disabled>WE LIT 🔥</button>
      <button id="endLiveBtn" type="button" disabled>End</button>
      <button id="toggleMicBtn" type="button" disabled>Mic On</button>
      <button id="toggleCamBtn" type="button" disabled>Cam On</button>
      <button id="copyWatchBtn" type="button" disabled>Copy</button>
    </section>

    <section class="live-hidden-setup" aria-label="Live setup">
      <input id="streamTitle" type="text" value="Family Bizness" />
      <textarea id="streamDescription" rows="3" placeholder="Tell viewers what this live is about..."></textarea>

      <select id="streamCategory">
        <option value="general">General</option>
        <option value="music">Music</option>
        <option value="gaming">Gaming</option>
        <option value="sports">Sports</option>
        <option value="store">Store</option>
        <option value="meta">Meta</option>
        <option value="gallery">Gallery</option>
        <option value="podcast">Podcast</option>
      </select>

      <select id="streamAccess">
        <option value="free">Free</option>
        <option value="paid">Paid</option>
        <option value="vip">VIP</option>
        <option value="subscriber">Subscriber</option>
        <option value="private">Private</option>
      </select>

      <input id="streamPrice" type="number" min="0" step="1" value="0" />
      <input id="streamThumbnail" type="url" placeholder="/images/brand/omni-watch.png.jpeg" />
      <input id="streamCover" type="url" placeholder="/images/brand/hero-banner.png" />

      <input id="chatEnabled" type="checkbox" checked />
      <input id="cohostEnabled" type="checkbox" checked />
      <input id="vipEnabled" type="checkbox" checked />
    </section>

    <aside class="live-overlay-stats">
      <span>Status <strong id="statStatus">off air</strong></span>
      <span>Viewers <strong id="statViewers">0</strong></span>
      <span>Peak <strong id="statPeak">0</strong></span>
      <span>Chat <strong id="statChat">0</strong></span>
      <span>Reactions <strong id="statReactions">0</strong></span>
      <span>Revenue <strong id="statRevenue">$0.00</strong></span>
    </aside>

    <aside class="live-overlay-chat">
      <p id="liveStatus" class="live-status" aria-live="polite">Checking auth...</p>

      <ul id="participantList" class="mini-list"></ul>
      <ul id="tipList" class="mini-list"></ul>
      <ul id="chatList" class="chat-list"></ul>

      <form id="chatForm" class="chat-form">
        <input id="chatInput" type="text" placeholder="Say something live..." maxlength="300" />
        <button type="submit">Send</button>
      </form>

      <button id="sendReactionBtn" class="reaction-btn" type="button">🔥</button>
    </aside>
  </main>

  <script type="module" src="/core/pages/live.js"></script>
</body>
</html>

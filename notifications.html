<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />

  <title>Notifications • Rich Bizness Mobile</title>

  <meta
    name="theme-color"
    content="#050805"
  />

  <link rel="stylesheet" href="/styles/base.css" />
  <link rel="stylesheet" href="/styles/sections.css" />
  <link rel="stylesheet" href="/styles/profile.css" />
  <link rel="stylesheet" href="/styles/forms.css" />
  <link rel="stylesheet" href="/styles/cards.css" />
  <link rel="stylesheet" href="/styles/omni-fx.css" />
</head>

<body class="rb-body rb-notifications-page">

  <div class="rb-bg-layer"></div>
  <div class="rb-bg-grid"></div>
  <div class="rb-bg-vignette"></div>
  <div class="rb-bg-noise"></div>
  <div class="rb-fx-smoke"></div>

  <header class="rb-topbar">

    <a class="rb-brand" href="/">
      <span>WELCOME BACK</span>
      <strong>RICH BIZNESS</strong>
      <small>LLC</small>
    </a>

    <nav class="rb-topnav" aria-label="Notifications navigation">
      <a href="/feed">Feed</a>
      <a href="/messages">Messages</a>
      <a href="/profile">Profile</a>
      <a href="/settings">Settings</a>
    </nav>

  </header>

  <main class="rb-section-shell rb-notifications-shell">

    <section class="rb-profile-card">

      <p class="rb-kicker">
        RICH BIZNESS ALERTS
      </p>

      <h1 id="notifications-title">
        Notifications
      </h1>

      <p
        id="notifications-status"
        class="rb-profile-bio"
      >
        Loading notification system...
      </p>

      <div class="rb-form-actions">

        <button
          id="notifications-refresh-btn"
          class="rb-main-launch"
          type="button"
        >
          REFRESH ALERTS
        </button>

      </div>

    </section>

    <section class="rb-profile-grid">

      <article class="rb-mini-card">

        <strong>
          Unread
        </strong>

        <span id="notifications-unread-count">
          0 alerts
        </span>

      </article>

      <article class="rb-mini-card">

        <strong>
          Status
        </strong>

        <span id="notifications-sync-status">
          Realtime ready
        </span>

      </article>

      <article class="rb-mini-card">

        <strong>
          Identity
        </strong>

        <span id="notifications-identity-status">
          Profile synced
        </span>

      </article>

    </section>

    <section
      id="notifications-list"
      class="rb-profile-grid rb-notifications-grid"
    ></section>

    <a
      href="/"
      class="rb-auth-home"
    >
      ← Back To Portal
    </a>

  </main>

  <script
    type="module"
    src="/core/pages/notifications.js"
  ></script>

</body>
</html>

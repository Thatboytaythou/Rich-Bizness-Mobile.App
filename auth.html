<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />

  <title>Rich Bizness • Auth</title>

  <meta name="theme-color" content="#050805" />

  <meta
    name="description"
    content="Rich Bizness Mobile identity login and signup."
  />

  <link rel="stylesheet" href="/styles/base.css" />
  <link rel="stylesheet" href="/styles/main.css" />
  <link rel="stylesheet" href="/styles/mobile.css" />
  <link rel="stylesheet" href="/styles/forms.css" />
  <link rel="stylesheet" href="/styles/omni-fx.css" />
</head>

<body class="rb-auth-page" data-auth-mode="signin">
  <div class="rb-bg-layer" aria-hidden="true"></div>
  <div class="rb-bg-grid" aria-hidden="true"></div>
  <div class="rb-bg-vignette" aria-hidden="true"></div>
  <div class="rb-bg-noise" aria-hidden="true"></div>
  <div class="rb-fx-smoke" aria-hidden="true"></div>

  <main class="rb-auth-shell">
    <section class="rb-auth-hero">
      <p class="rb-kicker">RICH BIZNESS IDENTITY</p>

      <h1>Enter The Universe</h1>

      <p>
        One identity. All platforms.<br />
        Live • Music • Gaming • Store • Meta • Creator Economy
      </p>
    </section>

    <section id="rb-auth-panel" class="rb-auth-panel is-signin">
      <div class="rb-auth-tabs" role="tablist" aria-label="Auth mode">
        <button
          class="is-active"
          type="button"
          data-auth-mode="signin"
          role="tab"
          aria-selected="true"
          aria-controls="rb-signin-form"
        >
          TAP IN 💰
        </button>

        <button
          type="button"
          data-auth-mode="signup"
          role="tab"
          aria-selected="false"
          aria-controls="rb-signup-form"
        >
          CREATE ID ✨
        </button>
      </div>

      <form id="rb-signin-form" class="rb-auth-form" autocomplete="on">
        <h2>Welcome Back</h2>

        <label>
          Email
          <input
            name="email"
            type="email"
            autocomplete="email"
            inputmode="email"
            placeholder="you@richbizness.com"
            required
          />
        </label>

        <label>
          Password
          <input
            name="password"
            type="password"
            autocomplete="current-password"
            placeholder="••••••••"
            required
          />
        </label>

        <button class="rb-main-launch" type="submit">
          TAP IN 💰
        </button>
      </form>

      <form id="rb-signup-form" class="rb-auth-form" autocomplete="on">
        <h2>Create Your Identity</h2>

        <label>
          Display Name
          <input
            name="display_name"
            type="text"
            autocomplete="name"
            placeholder="ThatboyTayThou"
          />
        </label>

        <label>
          Username
          <input
            name="username"
            type="text"
            autocomplete="username"
            autocapitalize="none"
            spellcheck="false"
            placeholder="thatboytaythou"
          />
        </label>

        <label>
          Email
          <input
            name="email"
            type="email"
            autocomplete="email"
            inputmode="email"
            placeholder="you@richbizness.com"
            required
          />
        </label>

        <label>
          Password
          <input
            name="password"
            type="password"
            autocomplete="new-password"
            placeholder="Create strong password"
            required
          />
        </label>

        <button class="rb-main-launch" type="submit">
          CREATE ID ✨
        </button>
      </form>

      <p
        id="rb-auth-message"
        class="rb-auth-message"
        aria-live="polite"
      ></p>
    </section>

    <a href="/" class="rb-auth-home">
      ← Back To Portal
    </a>
  </main>

  <script type="module" src="/core/pages/auth.js"></script>
</body>
</html>

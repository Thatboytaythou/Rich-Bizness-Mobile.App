<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Rich Bizness — Enter The Universe</title>

  <link rel="stylesheet" href="/styles/main.css" />
  <link rel="stylesheet" href="/styles/mobile.css" />
  <link rel="stylesheet" href="/styles/forms.css" />
  <link rel="stylesheet" href="/styles/omni-fx.css" />
</head>

<body class="rb-home rb-auth-page" data-auth-mode="signin">

  <div class="rb-bg"></div>
  <div class="rb-vignette"></div>
  <div class="rb-grid"></div>

  <main class="rb-auth-shell">

    <!-- HERO -->
    <section class="rb-auth-hero">
      <p class="rb-kicker">RICH BIZNESS IDENTITY</p>
      <h1>Enter The Universe</h1>
      <p>
        One identity. All platforms.<br>
        Live • Music • Gaming • Store • Meta • Creator Economy
      </p>
    </section>

    <!-- AUTH PANEL -->
    <section id="rb-auth-panel" class="rb-auth-panel is-signin">

      <!-- TABS -->
      <div class="rb-auth-tabs">
        <button type="button" data-auth-mode="signin" class="is-active">
          TAP IN 💰
        </button>
        <button type="button" data-auth-mode="signup">
          CREATE ID ✨
        </button>
      </div>

      <!-- SIGN IN FORM -->
      <form id="rb-signin-form" class="rb-auth-form">
        <h2>Welcome Back</h2>

        <label>
          Email
          <input 
            name="email" 
            type="email" 
            autocomplete="email" 
            placeholder="you@richbizness.com" 
            required 
          />
        </label>

        <label>
          Password
          <input 
            name="password" 
            type="password" 
            autocomplete="current-password" 
            placeholder="••••••••" 
            required 
          />
        </label>

        <button class="rb-main-launch" type="submit">
          TAP IN 💰
        </button>
      </form>

      <!-- SIGN UP FORM -->
      <form id="rb-signup-form" class="rb-auth-form">
        <h2>Create Your Identity</h2>

        <label>
          Display Name
          <input 
            name="display_name" 
            type="text" 
            autocomplete="name" 
            placeholder="ThatboyTayThou" 
          />
        </label>

        <label>
          Username
          <input 
            name="username" 
            type="text" 
            autocomplete="username" 
            placeholder="thatboytaythou" 
          />
        </label>

        <label>
          Email
          <input 
            name="email" 
            type="email" 
            autocomplete="email" 
            placeholder="you@richbizness.com" 
            required 
          />
        </label>

        <label>
          Password
          <input 
            name="password" 
            type="password" 
            autocomplete="new-password" 
            placeholder="Create strong password" 
            required 
          />
        </label>

        <button class="rb-main-launch" type="submit">
          CREATE ID ✨
        </button>
      </form>

    </section>

    <!-- BACK LINK -->
    <a href="/" class="rb-auth-home">
      ← Back To Portal
    </a>

  </main>

  <script type="module" src="/core/pages/auth.js"></script>
</body>
</html>

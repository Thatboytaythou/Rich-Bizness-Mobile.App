<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />

  <title>Feed • Rich Bizness Mobile</title>

  <meta
    name="theme-color"
    content="#050805"
  />

  <link rel="stylesheet" href="/styles/base.css" />
  <link rel="stylesheet" href="/styles/sections.css" />
  <link rel="stylesheet" href="/styles/cards.css" />
  <link rel="stylesheet" href="/styles/forms.css" />
  <link rel="stylesheet" href="/styles/feed.css" />
  <link rel="stylesheet" href="/styles/omni-fx.css" />
</head>

<body class="rb-body rb-feed-page">

  <div class="rb-bg-layer"></div>
  <div class="rb-bg-grid"></div>
  <div class="rb-bg-vignette"></div>
  <div class="rb-bg-noise"></div>
  <div class="rb-fx-smoke"></div>

  <header class="rb-topbar">

    <a class="rb-brand" href="/">
      <span>WELCOME BACK</span>
      <strong>RICH BIZNESS</strong>
      <small>LLC</small>
    </a>

    <nav class="rb-topnav" aria-label="Feed navigation">
      <a href="/watch">Watch</a>
      <a href="/live">Live</a>
      <a href="/music">Music</a>
      <a href="/gaming">Gaming</a>
      <a href="/sports">Sports</a>
      <a href="/profile">Profile</a>
    </nav>

  </header>

  <main class="rb-section-shell rb-feed-shell">

    <section class="rb-section-hero">

      <div class="rb-section-hero-copy">

        <p class="rb-kicker">RICH BIZNESS LLC</p>

        <h1>Feed</h1>

        <p class="rb-subtitle">
          Post, react, comment, and keep the Rich Bizness universe fully synced in realtime.
        </p>

      </div>

      <a class="rb-back" href="/">
        ← Back To Portal
      </a>

    </section>

    <section class="rb-feed-layout">

      <aside class="rb-card rb-composer-card">

        <div class="rb-user-strip">

          <img
            id="composerAvatar"
            src="/images/brand/project-avatar.png.jpeg"
            alt="Composer Avatar"
          />

          <div>
            <strong id="composerName">
              Rich Bizness User
            </strong>

            <small id="feedStatus">
              Loading feed...
            </small>
          </div>

        </div>

        <form
          id="feedForm"
          class="rb-form"
        >

          <label for="feedTitle">
            Title

            <input
              id="feedTitle"
              type="text"
              placeholder="What’s the headline?"
            />
          </label>

          <label for="feedBody">
            Post

            <textarea
              id="feedBody"
              rows="5"
              placeholder="Say what’s happening in Rich Bizness..."
            ></textarea>
          </label>

          <label for="feedMediaUrl">
            Media URL

            <input
              id="feedMediaUrl"
              type="url"
              placeholder="Image, video, or audio URL"
            />
          </label>

          <div class="rb-form-row">

            <label for="feedMediaType">

              Media Type

              <select id="feedMediaType">
                <option value="">None</option>
                <option value="image">Image</option>
                <option value="video">Video</option>
                <option value="audio">Audio</option>
              </select>

            </label>

            <label for="feedSection">

              Section

              <select id="feedSection">
                <option value="feed">Feed</option>
                <option value="music">Music</option>
                <option value="live">Live</option>
                <option value="gaming">Gaming</option>
                <option value="sports">Sports</option>
                <option value="gallery">Gallery</option>
                <option value="store">Store</option>
                <option value="meta">Meta</option>
              </select>

            </label>

          </div>

          <label for="feedVisibility">

            Visibility

            <select id="feedVisibility">
              <option value="public">Public</option>
              <option value="followers">Followers</option>
              <option value="private">Private</option>
            </select>

          </label>

          <div class="rb-form-actions">

            <button
              id="feedSubmitBtn"
              type="submit"
              class="rb-main-launch"
            >
              POST TO FEED
            </button>

            <button
              id="feedRefreshBtn"
              type="button"
              class="rb-btn ghost"
            >
              REFRESH
            </button>

          </div>

        </form>

      </aside>

      <section class="rb-feed-main">

        <div
          id="feedEmpty"
          class="rb-card rb-empty"
          style="display:none;"
        >

          <h2>No Posts Yet</h2>

          <p>
            Drop the first Rich Bizness post and start the motion.
          </p>

        </div>

        <div
          id="feedList"
          class="rb-feed-list"
        ></div>

      </section>

    </section>

  </main>

  <script
    type="module"
    src="/core/pages/feed.js"
  ></script>

</body>
</html>

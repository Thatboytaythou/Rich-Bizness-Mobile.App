<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Rich Bizness — Profile</title>

  <link rel="stylesheet" href="/styles/main.css" />
  <link rel="stylesheet" href="/styles/mobile.css" />
  <link rel="stylesheet" href="/styles/profile.css" />
  <link rel="stylesheet" href="/styles/omni-fx.css" />
</head>

<body class="rb-home rb-profile-page">

  <div class="rb-bg"></div>
  <div class="rb-vignette"></div>
  <div class="rb-grid"></div>

  <main class="rb-profile-shell">

    <!-- =========================
         TOPBAR
    ========================== -->

    <header class="rb-profile-top">

      <a href="/" class="rb-auth-home">
        ← Portal
      </a>

      <a href="/settings" class="rb-auth-home">
        Settings
      </a>

      <button
        class="rb-auth-home rb-profile-signout"
        type="button"
        data-rb-signout
      >
        I’m Out ✌🏽
      </button>

    </header>

    <!-- =========================
         BANNER
    ========================== -->

    <section
      id="profile-banner"
      class="rb-profile-banner"
      style="background-image:url('/images/profile/default-banner.png')"
    >

      <div class="rb-profile-banner-overlay"></div>

      <div class="rb-profile-avatar-wrap">

        <img
          id="profile-avatar"
          src="/images/brand/project-avatar.png.jpeg"
          alt="Profile avatar"
        />

      </div>

    </section>

    <!-- =========================
         PROFILE CARD
    ========================== -->

    <section class="rb-profile-card">

      <p
        id="profile-badge"
        class="rb-kicker"
      >
        MEMBER
      </p>

      <h1 id="profile-name">
        Rich User
      </h1>

      <p
        id="profile-handle"
        class="rb-profile-handle"
      >
        @richuser
      </p>

      <p
        id="profile-bio"
        class="rb-profile-bio"
      >
        Loading profile...
      </p>

      <div class="rb-profile-actions">

        <button
          id="profile-edit-btn"
          class="rb-main-launch"
          type="button"
        >
          EDIT PROFILE
        </button>

      </div>

    </section>

    <!-- =========================
         GRID
    ========================== -->

    <section class="rb-profile-grid">

      <article class="rb-profile-box">
        <strong>Identity</strong>

        <span>
          Avatar • Profile • Creator status
        </span>
      </article>

      <article class="rb-profile-box">
        <strong>Universe</strong>

        <span>
          Live • Music • Gaming • Meta
        </span>
      </article>

      <article class="rb-profile-box">
        <strong>Economy</strong>

        <span>
          Store • Wallet • Unlocks
        </span>
      </article>

    </section>

  </main>

  <!-- =========================
       PAGE
  ========================== -->

  <script
    type="module"
    src="/core/pages/profile.js"
  ></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />

  <title>Messages • Rich Bizness Mobile</title>

  <meta
    name="theme-color"
    content="#050805"
  />

  <link rel="stylesheet" href="/styles/base.css" />
  <link rel="stylesheet" href="/styles/sections.css" />
  <link rel="stylesheet" href="/styles/forms.css" />
  <link rel="stylesheet" href="/styles/profile.css" />
  <link rel="stylesheet" href="/styles/cards.css" />
  <link rel="stylesheet" href="/styles/omni-fx.css" />
</head>

<body class="rb-body rb-messages-page">

  <div class="rb-bg-layer"></div>
  <div class="rb-bg-grid"></div>
  <div class="rb-bg-vignette"></div>
  <div class="rb-bg-noise"></div>
  <div class="rb-fx-smoke"></div>

  <header class="rb-topbar">

    <a class="rb-brand" href="/">
      <span>WELCOME BACK</span>
      <strong>RICH BIZNESS</strong>
      <small>LLC</small>
    </a>

    <nav class="rb-topnav" aria-label="Messages navigation">
      <a href="/feed">Feed</a>
      <a href="/notifications">Alerts</a>
      <a href="/profile">Profile</a>
      <a href="/settings">Settings</a>
    </nav>

  </header>

  <main class="rb-section-shell rb-messages-shell">

    <section class="rb-profile-card">

      <p class="rb-kicker">
        RICH BIZNESS DMS
      </p>

      <div class="rb-profile-avatar-wrap">

        <img
          id="messages-user-avatar"
          src="/images/brand/Avatar-hero-Banner.png.jpeg"
          alt="Profile"
        />

      </div>

      <h1 id="messages-user-name">
        Rich User
      </h1>

      <p
        id="messages-user-handle"
        class="rb-profile-handle"
      >
        @richuser
      </p>

      <p
        id="messages-status"
        class="rb-profile-bio"
      >
        Loading messages...
      </p>

      <div class="rb-form-actions">

        <button
          id="messages-new-btn"
          class="rb-main-launch"
          type="button"
        >
          START MESSAGE
        </button>

      </div>

    </section>

    <section class="rb-profile-grid">

      <article class="rb-mini-card">

        <strong>
          Threads
        </strong>

        <span id="messages-thread-count">
          0 active conversations
        </span>

      </article>

      <article class="rb-mini-card">

        <strong>
          Status
        </strong>

        <span id="messages-sync-status">
          Realtime ready
        </span>

      </article>

      <article class="rb-mini-card">

        <strong>
          Identity
        </strong>

        <span id="messages-identity-status">
          Profile synced
        </span>

      </article>

    </section>

    <a
      href="/"
      class="rb-auth-home"
    >
      ← Back To Portal
    </a>

  </main>

  <script
    type="module"
    src="/core/pages/messages.js"
  ></script>

</body>
</html>

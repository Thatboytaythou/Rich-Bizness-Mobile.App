<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Rich Bizness • Universe</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />

  <link rel="stylesheet" href="/styles/base.css" />
  <link rel="stylesheet" href="/styles/omni-fx.css" />
  <link rel="stylesheet" href="/styles/omni-dial.css" />
  <link rel="stylesheet" href="/styles/omni-portal.css" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
</head>

<body>
  <div id="portal-container"></div>

  <main class="rb-shell">
    <header class="rb-header glass-smoke">
      <div>
        <h1 class="rb-title">RICH <span class="burnt-gold">BIZNESS</span></h1>
        <p class="rb-subtitle">LLC • SMOKE &amp; EMPIRE</p>
      </div>

      <button class="rb-live-pill" type="button" data-route="live">
        <span class="rb-live-dot"></span>
        LIVE
      </button>
    </header>

    <section class="rb-hub">
      <div class="rb-portal-ring"></div>

      <button data-route="feed" class="rb-pill-module pos-feed c-feed"><i class="fa-solid fa-fire"></i><span>Feed</span></button>
      <button data-route="edit" class="rb-pill-module pos-edit c-edit"><i class="fa-solid fa-pen-nib"></i><span>Edit</span></button>
      <button data-route="settings" class="rb-pill-module pos-settings c-settings"><i class="fa-solid fa-gear"></i><span>Settings</span></button>

      <button data-route="music" class="phone-hub rb-module pos-music c-music"><i class="fa-solid fa-music"></i><span>Music</span><small>Tracks</small></button>
      <button data-route="podcast" class="phone-hub rb-module pos-podcast c-podcast"><i class="fa-solid fa-microphone-lines"></i><span>Podcast</span><small>Shows</small></button>
      <button data-route="radio" class="phone-hub rb-module pos-radio c-radio"><i class="fa-solid fa-radio"></i><span>Radio</span><small>Live audio</small></button>
      <button data-route="gaming" class="phone-hub rb-module pos-gaming c-gaming"><i class="fa-solid fa-gamepad"></i><span>Gaming</span><small>Arcade</small></button>

      <button data-route="gallery" class="phone-hub rb-module pos-gallery c-gallery"><i class="fa-solid fa-image"></i><span>Gallery</span><small>Media</small></button>
      <button data-route="watch" class="phone-hub rb-module pos-watch c-watch"><i class="fa-solid fa-tv"></i><span>Watch</span><small>Live view</small></button>
      <button data-route="sports" class="phone-hub rb-module pos-sports c-sports"><i class="fa-solid fa-football"></i><span>Sports</span><small>Zone</small></button>
      <button data-route="store" class="phone-hub rb-module pos-store c-store"><i class="fa-solid fa-store"></i><span>Store</span><small>Market</small></button>

      <button data-route="creator" class="phone-hub rb-module pos-creator c-creator"><i class="fa-solid fa-crown"></i><span>Creator</span><small>Hub</small></button>
      <button data-route="meta" class="phone-hub rb-module pos-meta c-meta"><i class="fa-solid fa-globe"></i><span>Meta</span><small>World</small></button>

      <button data-route="live" class="phone-hub rb-main-phone">
        <div class="phone-mockup">
          <div class="rb-main-card">
            <div class="rb-main-icon">
              <i class="fa-solid fa-broadcast-tower"></i>
            </div>
            <h2>Go Live</h2>
            <p>ENTER THE SMOKE</p>
          </div>
        </div>
      </button>

      <button data-route="messages" class="rb-pill-module pos-messages c-messages"><i class="fa-solid fa-comments"></i><span>Messages</span></button>
      <button data-route="notifications" class="rb-pill-module pos-notifications c-notifications"><i class="fa-solid fa-bell"></i><span>Alerts</span></button>
      <button data-route="profile" class="rb-pill-module pos-profile c-profile"><i class="fa-solid fa-user"></i><span>Profile</span></button>
      <button data-route="admin" class="rb-pill-module pos-admin c-admin"><i class="fa-solid fa-shield-halved"></i><span>Admin</span></button>
      <button data-route="upload" class="rb-pill-module pos-upload c-upload"><i class="fa-solid fa-cloud-arrow-up"></i><span>Upload</span></button>
    </section>

    <section class="rb-hero-text">
      <h2 class="rb-hero-title">ALL IN ONE <span class="burnt-gold">UNIVERSE</span></h2>
      <p class="rb-hero-tag">SMOKE • POWER • LEGACY</p>
    </section>

    <section class="rb-stats">
      <div class="rb-stat glass-smoke"><strong>10M+</strong><span>Members</span></div>
      <div class="rb-stat glass-smoke"><strong>500K+</strong><span>Creators</span></div>
      <div class="rb-stat glass-smoke"><strong>100K+</strong><span>Live Now</span></div>
      <div class="rb-stat glass-smoke"><strong>∞</strong><span>Realms</span></div>
    </section>
  </main>

  <script type="module" src="/core/pages/index.js"></script>
</body>
</html>

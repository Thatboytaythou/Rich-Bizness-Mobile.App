<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Rich Bizness • Universe</title>

  <link rel="stylesheet" href="/styles/base.css" />
  <link rel="stylesheet" href="/styles/omni-fx.css" />
  <link rel="stylesheet" href="/styles/omni-portal.css" />
  <link rel="stylesheet" href="/styles/omni-dial.css" />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js" defer></script>
  <script src="/core/engine/universe-preview.js" defer></script>
  <script src="/core/pages/index.js" defer></script>
</head>

<body class="rb-index-page">
  <div id="portal-container" aria-hidden="true"></div>

  <main class="rb-index-shell">
    <header class="rb-hero-lock">
      <p class="rb-kicker">RICH BIZNESS MOBILE</p>
      <h1>Reality <span>Changers</span></h1>

      <button class="rb-guest-card" type="button" data-route="auth">
        <span class="rb-guest-icon">?</span>
        <span>
          <strong>Guest Mode</strong>
          <small>SIGN IN</small>
        </span>
      </button>
    </header>

    <section class="rb-universe-stage" aria-label="Rich Bizness Universe Hub">
      <button class="rb-profile-side" type="button" data-route="profile">
        <i class="fa-solid fa-user"></i>
        <span>Profile</span>
      </button>

      <nav class="rb-right-tabs" aria-label="Utility sections">
        <button type="button" data-route="admin"><i class="fa-solid fa-shield-halved"></i><span>Admin</span></button>
        <button type="button" data-route="creator"><i class="fa-solid fa-crown"></i><span>Creator</span></button>
        <button type="button" data-route="watch"><i class="fa-solid fa-tv"></i><span>Watch</span></button>
        <button type="button" data-route="notifications"><i class="fa-solid fa-bell"></i><span>Alerts</span></button>
        <button type="button" data-route="settings"><i class="fa-solid fa-gear"></i><span>Settings</span></button>
        <button type="button" data-route="edit"><i class="fa-solid fa-pen-nib"></i><span>Edit</span></button>
      </nav>

      <div class="rb-orbit-wrap">
        <div class="rb-portal-core">
          <div class="rb-portal-rings"></div>
          <button class="rb-center-action" type="button" data-route="live">
            <span class="rb-live-chip">LIVE</span>
            <i class="fa-solid fa-broadcast-tower"></i>
            <strong>Go Live</strong>
            <small>ENTER THE SMOKE</small>
          </button>
        </div>

        <div class="rb-orbit-track" id="rbOrbitTrack">
          <button class="rb-tv-card is-front" type="button" data-route="live">
            <small>LIVE</small><strong>Go Live</strong><span>Broadcast • VIP • Realtime</span>
          </button>
          <button class="rb-tv-card" type="button" data-route="music">
            <small>MUSIC</small><strong>Music Universe</strong><span>Tracks • Playlists • Artists</span>
          </button>
          <button class="rb-tv-card" type="button" data-route="gallery">
            <small>GALLERY</small><strong>Visual Drops</strong><span>Photos • Clips • Moments</span>
          </button>
          <button class="rb-tv-card" type="button" data-route="podcast">
            <small>PODCAST</small><strong>Podcast Shows</strong><span>Episodes • Voices • Stories</span>
          </button>
          <button class="rb-tv-card" type="button" data-route="radio">
            <small>RADIO</small><strong>Live Radio</strong><span>Stations • Streams • Audio</span>
          </button>
          <button class="rb-tv-card" type="button" data-route="gaming">
            <small>GAMES</small><strong>Arcade District</strong><span>Scores • Clips • Tournaments</span>
          </button>
          <button class="rb-tv-card" type="button" data-route="upload">
            <small>UPLOAD</small><strong>Upload Content</strong><span>Share • Route • Publish</span>
          </button>
          <button class="rb-tv-card" type="button" data-route="sports">
            <small>SPORTS</small><strong>Sports Arena</strong><span>Picks • Scores • Broadcasts</span>
          </button>
          <button class="rb-tv-card" type="button" data-route="feed">
            <small>FEED</small><strong>Global Feed</strong><span>Posts • Drops • Community</span>
          </button>
          <button class="rb-tv-card" type="button" data-route="meta">
            <small>META</small><strong>Meta World</strong><span>Avatars • Worlds • Portals</span>
          </button>
          <button class="rb-tv-card" type="button" data-route="store">
            <small>STORE</small><strong>Creator Market</strong><span>Products • Unlocks • Sellers</span>
          </button>
        </div>
      </div>
    </section>

    <section class="rb-main-copy">
      <h2>ALL IN ONE <span>UNIVERSE</span></h2>
      <p>SMOKE • POWER • LEGACY</p>
      <button type="button" data-route="feed">ENTER REALITY</button>
    </section>

    <nav class="rb-bottom-nav" aria-label="Main quick links">
      <button type="button" data-route="feed">Feed</button>
      <button type="button" data-route="live" class="active">Live</button>
      <button type="button" data-route="music">Music</button>
      <button type="button" data-route="gaming">Games</button>
      <button type="button" data-route="meta">Meta</button>
    </nav>
  </main>
</body>
</html>

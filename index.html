<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rich Bizness • Universe</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <style>
    body {
      background: #030712;
      overflow-x: hidden;
    }
    .hero-bg {
      background: linear-gradient(180deg, rgba(15,23,42,0.95), rgba(3,7,18,0.98)),
                  radial-gradient(circle at center, rgba(59,130,246,0.15), transparent 70%);
    }
    .glass {
      background: rgba(15, 23, 42, 0.65);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(234, 179, 8, 0.25);
    }
    .portal-glow {
      box-shadow: 0 0 120px -20px #3b82f6,
                  0 0 60px -10px #22d3ee;
    }
  </style>
</head>
<body class="text-white min-h-screen pb-20">

  <!-- 3D Background -->
  <div id="globe-container" class="fixed inset-0 z-[-1]"></div>

  <div class="max-w-6xl mx-auto px-6 pt-8 relative z-10">

    <!-- Header -->
    <div class="glass rounded-3xl p-6 flex justify-between items-center mb-10">
      <div>
        <h1 class="text-5xl font-black tracking-tighter">RICH <span class="text-[#22d3ee]">BIZNESS</span></h1>
        <p class="text-gray-400">LLC • EMPIRE OF THE UNIVERSE</p>
      </div>
      <div class="px-5 py-2 bg-cyan-500/10 border border-cyan-400 rounded-full flex items-center gap-2 text-sm">
        <div class="w-3 h-3 bg-cyan-400 rounded-full animate-pulse"></div>
        LIVE
      </div>
    </div>

    <!-- Cinematic Hero -->
    <div class="hero-bg relative h-[620px] rounded-3xl overflow-hidden border border-cyan-500/30 mb-16 flex items-center justify-center">
      
      <!-- GTA Style Avatar -->
      <div class="absolute left-12 bottom-20 z-20">
        <div class="w-64 h-96 bg-gradient-to-b from-slate-800 to-black rounded-3xl border border-cyan-400/50 flex flex-col items-center justify-end p-6 portal-glow">
          <div class="text-7xl mb-4">🧢</div>
          <div class="text-cyan-300 font-bold text-xl">THE LEGEND</div>
          <div class="text-xs text-gray-400 tracking-widest">RICH BIZNESS EMPIRE</div>
        </div>
      </div>

      <!-- Central Portal Phone -->
      <div onclick="goLive()" class="phone-mockup w-80 relative z-30 cursor-pointer">
        <div class="bg-zinc-950 rounded-3xl h-[560px] flex flex-col items-center justify-center text-center p-8 border border-cyan-400/30">
          <div class="w-32 h-32 bg-gradient-to-br from-cyan-400 to-blue-600 rounded-3xl flex items-center justify-center mb-10 portal-glow">
            <i class="fa-solid fa-broadcast-tower text-7xl text-black"></i>
          </div>
          <h2 class="text-4xl font-bold mb-3">Go Live</h2>
          <p class="text-cyan-300 text-lg">ENTER THE PORTAL</p>
        </div>
      </div>

      <!-- Floating Module Phones -->
      <div class="absolute right-12 top-32 phone-mockup w-52 scale-75 cursor-pointer" onclick="selectModule('music')">
        <div class="bg-zinc-950 rounded-3xl h-72 flex flex-col items-center justify-center">
          <i class="fa-solid fa-music text-5xl text-purple-400"></i>
          <p class="mt-6 font-bold">Music</p>
        </div>
      </div>

      <div class="absolute right-8 bottom-32 phone-mockup w-52 scale-75 cursor-pointer" onclick="selectModule('gaming')">
        <div class="bg-zinc-950 rounded-3xl h-72 flex flex-col items-center justify-center">
          <i class="fa-solid fa-gamepad text-5xl text-cyan-400"></i>
          <p class="mt-6 font-bold">Gaming</p>
        </div>
      </div>
    </div>

    <!-- Stats -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-16">
      <div class="glass rounded-3xl p-6 text-center"><div class="text-4xl font-bold text-cyan-400">10M+</div><div class="text-gray-400">Members</div></div>
      <div class="glass rounded-3xl p-6 text-center"><div class="text-4xl font-bold text-cyan-400">500K+</div><div class="text-gray-400">Creators</div></div>
      <div class="glass rounded-3xl p-6 text-center"><div class="text-4xl font-bold text-cyan-400">100K+</div><div class="text-gray-400">Live Now</div></div>
      <div class="glass rounded-3xl p-6 text-center"><div class="text-4xl font-bold text-cyan-400">∞</div><div class="text-gray-400">Modules</div></div>
    </div>
  </div>

  <script>
    // 3D Galactic Portal Globe
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('globe-container').appendChild(renderer.domElement);

    const globe = new THREE.Mesh(
      new THREE.SphereGeometry(11, 64, 64),
      new THREE.MeshPhongMaterial({ 
        color: 0x22d3ee, 
        emissive: 0x1e40af,
        shininess: 12,
        transparent: true,
        opacity: 0.85
      })
    );
    scene.add(globe);

    const innerGlow = new THREE.Mesh(
      new THREE.SphereGeometry(8, 64, 64),
      new THREE.MeshBasicMaterial({ color: 0x67e8f9, transparent: true, opacity: 0.4, blending: THREE.AdditiveBlending })
    );
    scene.add(innerGlow);

    scene.add(new THREE.AmbientLight(0xffffff, 0.4));
    const pointLight = new THREE.PointLight(0x67e8f9, 3);
    pointLight.position.set(30, 20, 40);
    scene.add(pointLight);

    camera.position.z = 32;

    function animate() {
      requestAnimationFrame(animate);
      globe.rotation.y += 0.0012;
      innerGlow.rotation.y += 0.0018;
      renderer.render(scene, camera);
    }
    animate();

    function goLive() {
      alert("🌌 Opening Portal to Live Stream Reality...");
    }
    function selectModule(mod) {
      alert(`Entering ${mod.toUpperCase()} Universe...`);
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rich Bizness • Universe</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <style>
    body { background: #0a0f0a; margin:0; overflow:hidden; font-family: system-ui; }
    .label {
      position: absolute;
      color: #fbbf24;
      font-size: 0.95rem;
      font-weight: bold;
      pointer-events: none;
      text-shadow: 0 0 10px rgba(251, 191, 36, 0.8);
      transition: opacity 0.2s;
    }
  </style>
</head>
<body>

  <div id="canvas-container" class="absolute inset-0"></div>

  <div class="absolute top-8 left-1/2 -translate-x-1/2 text-center z-10">
    <h1 class="text-5xl font-black tracking-tighter">RICH <span class="text-yellow-400">BIZNESS</span></h1>
    <p class="text-emerald-400">LLC • SMOKE & EMPIRE</p>
  </div>

  <script>
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    // Central Portal
    const portal = new THREE.Mesh(
      new THREE.SphereGeometry(8, 64, 64),
      new THREE.MeshPhongMaterial({ color: 0x10b981, emissive: 0x064e3b, shininess: 30 })
    );
    scene.add(portal);

    // Lighting
    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const light = new THREE.PointLight(0xfacc15, 3);
    light.position.set(20, 30, 40);
    scene.add(light);

    camera.position.z = 45;

    const phones = [];
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    let hoveredPhone = null;

    const modules = ["Feed", "Live", "Gaming", "Sports", "Music", "Podcast", "Radio", "Gallery", "Store", "Meta"];

    function createPhone(label) {
      const group = new THREE.Group();

      // Phone body
      const body = new THREE.Mesh(
        new THREE.BoxGeometry(3, 6, 0.4),
        new THREE.MeshPhongMaterial({ color: 0x111827 })
      );
      group.add(body);

      // Screen
      const screen = new THREE.Mesh(
        new THREE.PlaneGeometry(2.6, 5.2),
        new THREE.MeshPhongMaterial({ color: 0x1f2937, emissive: 0x10b981, emissiveIntensity: 0.2 })
      );
      screen.position.z = 0.21;
      group.add(screen);

      group.userData = { label };
      scene.add(group);
      phones.push(group);
      return group;
    }

    // Create phones in circle
    modules.forEach((label, i) => {
      const phone = createPhone(label);
      const angle = (i / modules.length) * Math.PI * 2;
      const radius = 22;
      phone.position.x = Math.cos(angle) * radius;
      phone.position.z = Math.sin(angle) * radius - 5;
      phone.rotation.y = angle + Math.PI / 2;
    });

    // Mouse interaction
    const labelElement = document.createElement('div');
    labelElement.className = 'label';
    document.body.appendChild(labelElement);

    window.addEventListener('mousemove', (e) => {
      mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(phones, true);

      if (intersects.length > 0) {
        const obj = intersects[0].object.parent;
        if (hoveredPhone !== obj) {
          if (hoveredPhone) hoveredPhone.scale.set(1, 1, 1);
          hoveredPhone = obj;
          obj.scale.set(1.2, 1.2, 1.2);
          
          labelElement.textContent = obj.userData.label;
          labelElement.style.left = e.clientX + 20 + 'px';
          labelElement.style.top = e.clientY - 10 + 'px';
          labelElement.style.opacity = '1';
        }
      } else {
        if (hoveredPhone) {
          hoveredPhone.scale.set(1, 1, 1);
          hoveredPhone = null;
          labelElement.style.opacity = '0';
        }
      }
    });

    function animate() {
      requestAnimationFrame(animate);
      portal.rotation.y += 0.0012;

      phones.forEach((phone, i) => {
        const time = Date.now() * 0.0004 + i;
        phone.position.x = Math.cos(time) * 22;
        phone.position.z = Math.sin(time) * 22 - 5;
        phone.rotation.y = time + Math.PI / 2;
      });

      renderer.render(scene, camera);
    }

    animate();

    window.goLive = () => alert("🌫️ Entering the Smoke Portal...");
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />

  <title>Rich Bizness • Universe</title>
  <meta name="theme-color" content="#050805" />
  <meta
    name="description"
    content="Rich Bizness Mobile — cinematic universe portal hub."
  />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

  <link rel="stylesheet" href="/styles/base.css" />
  <link rel="stylesheet" href="/styles/main.css" />
  <link rel="stylesheet" href="/styles/mobile.css" />

  <link rel="stylesheet" href="/styles/three.css" />
  <link rel="stylesheet" href="/styles/three-avatar.css" />
  <link rel="stylesheet" href="/styles/avatar.css" />

  <link rel="stylesheet" href="/styles/omni-fx.css" />
  <link rel="stylesheet" href="/styles/omni-portal.css" />
  <link rel="stylesheet" href="/styles/omni-dial.css" />
</head>

<body class="rb-index-page">
  <div id="canvas-container" aria-hidden="true"></div>

  <div class="rb-fx-smoke" aria-hidden="true"></div>
  <div class="rb-bg-grid" aria-hidden="true"></div>
  <div class="rb-bg-vignette" aria-hidden="true"></div>
  <div class="rb-bg-noise" aria-hidden="true"></div>

  <header class="rb-brand-header">
    <h1>RICH <span>BIZNESS</span></h1>
    <p>LLC • SMOKE &amp; EMPIRE</p>
  </header>

  <button class="rb-profile-chip" data-route="profile" type="button" aria-label="Open profile">
    <img src="/images/brand/meta-avatar.png.jpeg" alt="Profile" />
    <span>Tap In</span>
  </button>

  <button class="rb-tab-dropper" id="tabDropper" type="button" aria-label="Open quick tabs">
    ☰
  </button>

  <nav class="rb-side-tabs rb-slide-tabs" id="slideTabs" aria-label="Quick actions">
    <button data-route="admin" type="button" aria-label="Admin">🛡️</button>
    <button data-route="creator" type="button" aria-label="Creator">👑</button>
    <button data-route="watch" type="button" aria-label="Watch">📺</button>
    <button data-route="notifications" type="button" aria-label="Notifications">🔔</button>
    <button data-route="settings" type="button" aria-label="Settings">⚙️</button>
    <button data-route="edit" type="button" aria-label="Edit">✒️</button>
    <button data-route="messages" type="button" aria-label="Messages">💬</button>
    <button data-route="secretDoor" type="button" aria-label="Secret Door">🔐</button>
    <button data-route="secretMeta2" type="button" aria-label="Secret Meta">🪐</button>
    <button data-route="secretMeta3" type="button" aria-label="Secret Galaxy">🌌</button>
  </nav>

  <main class="rb-universe-shell">
    <section class="rb-universe-stage" aria-label="Rich Bizness Universe Hub">
      <div id="module-label" class="rb-module-label active">
        RICH BIZNESS ONLINE
      </div>
    </section>
  </main>

  <nav class="rb-bottom-nav" aria-label="Primary navigation">
    <button data-route="feed" type="button" aria-label="Feed">
      <span class="rb-nav-icon">🔥</span>
      <span>Feed</span>
    </button>

    <button data-route="live" type="button" aria-label="Live">
      <span class="rb-nav-icon rb-live-nav-dot">📡</span>
      <span>Live</span>
    </button>

    <button data-route="music" type="button" aria-label="Music">
      <span class="rb-nav-icon">🎵</span>
      <span>Music</span>
    </button>

    <button data-route="gaming" type="button" aria-label="Gaming">
      <span class="rb-nav-icon">🎮</span>
      <span>Gaming</span>
    </button>

    <button data-route="upload" type="button" aria-label="Upload">
      <span class="rb-nav-icon">⬆️</span>
      <span>Upload</span>
    </button>
  </nav>

  <script type="module" src="/core/engine/universe-preview.js"></script>

  <script type="module" src="/core/pages/live-activity.js"></script>
  <script type="module" src="/core/pages/online-presence.js"></script>
  <script type="module" src="/core/pages/realtime-notifications.js"></script>
  <script type="module" src="/core/pages/bottom-dock-realtime.js"></script>
  <script type="module" src="/core/pages/index.js"></script>

  <script>
    const dropper = document.getElementById("tabDropper");
    const tabs = document.getElementById("slideTabs");

    dropper?.addEventListener("click", () => {
      dropper.classList.toggle("is-open");
      tabs?.classList.toggle("is-open");
    });

    document.addEventListener("click", (event) => {
      const clickedInsideMenu = event.target.closest("#slideTabs");
      const clickedDropper = event.target.closest("#tabDropper");

      if (!clickedInsideMenu && !clickedDropper) {
        dropper?.classList.remove("is-open");
        tabs?.classList.remove("is-open");
      }
    });
  </script>
</body>
</html>

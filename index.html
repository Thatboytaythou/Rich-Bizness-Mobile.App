<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Rich Bizness Universe</title>
  <meta name="theme-color" content="#020602" />

  <link rel="stylesheet" href="/styles/base.css" />
  <link rel="stylesheet" href="/styles/omni-fx.css" />
  <link rel="stylesheet" href="/styles/omni-dial.css" />
  <link rel="stylesheet" href="/styles/omni-portal.css" />
  <link rel="stylesheet" href="/styles/three-avatar.css" />   <!-- 3D Avatar -->
</head>

<body class="rb-index-page" data-active-section="live">

  <div class="rb-bg-layer"></div>
  <div class="rb-bg-grid"></div>
  <div class="rb-bg-vignette"></div>
  <div class="rb-bg-noise"></div>

  <main class="rb-index-shell">

    <header class="rb-index-top">
      <div class="rb-brand-lock">
        <small>WELCOME BACK</small>
        <h1><span>RICH</span> <strong>BIZNESS</strong></h1>
        <b>LLC</b>
      </div>

      <!-- 3D AVATAR PROFILE PILL -->
      <button class="rb-profile-pill" id="rb-open-profile" type="button">
        <div class="rb-avatar-3d-container" id="rb-avatar-3d-container">
          <canvas id="rb-avatar-canvas" width="64" height="64"></canvas>
        </div>
        <span>
          <strong id="rb-home-name">Guest Mode</strong>
          <small id="rb-home-badge">ENTER REALITY</small>
        </span>
      </button>
    </header>

    <section class="rb-index-hero">
      <p>EVERYTHING YOU NEED</p>
      <h2>ALL IN ONE <strong>UNIVERSE</strong></h2>
      <small>CONNECT • CREATE • EARN</small>
    </section>

    <section class="rb-universe-stage" aria-label="Rich Bizness Universe">

      <div class="rb-portal-core" aria-hidden="true">
        <div class="rb-portal-ring"></div>
        <div class="rb-portal-ring-two"></div>
        <div class="rb-portal-ring-three"></div>
        <div class="rb-portal-glow"></div>

        <div class="rb-portal-center">
          <b>RB</b>
          <span>RICH BIZNESS</span>
          <small>UNIVERSE</small>
        </div>
      </div>

      <div class="rb-dial-orbit" id="rb-dial-orbit">

        <button class="rb-orbit-card" data-section="sports" type="button">
          <img src="/images/brand/sports-logo.png.jpeg" alt="Sports" />
          <span>Sports</span>
          <small>ACTION</small>
        </button>

        <button class="rb-orbit-card" data-section="music" type="button">
          <img src="/images/brand/music-log.png.jpeg" alt="Music" />
          <span>Music</span>
          <small>UNIVERSE</small>
        </button>

        <button class="rb-orbit-card" data-section="feed" type="button">
          <img src="/images/brand/project-avatar.png.jpeg" alt="Feed" />
          <span>Global Feed</span>
          <small>DISCOVER</small>
        </button>

        <button class="rb-orbit-card is-active" data-section="live" type="button">
          <img src="/images/brand/omni-watch.png.jpeg" alt="Live" />
          <span>Go Live</span>
          <small>LIVE STREAM</small>
        </button>

        <button class="rb-orbit-card" data-section="store" type="button">
          <img src="/images/brand/gta-studio.png.jpeg" alt="Store" />
          <span>The Store</span>
          <small>SHOP</small>
        </button>

        <button class="rb-orbit-card" data-section="gaming" type="button">
          <img src="/images/brand/chess-gaming-logo.png.jpeg" alt="Gaming" />
          <span>Gaming</span>
          <small>PLAY</small>
        </button>

        <button class="rb-orbit-card" data-section="meta" type="button">
          <img src="/images/brand/meta-avatar.png.jpeg" alt="Meta" />
          <span>Meta</span>
          <small>WORLD</small>
        </button>

      </div>

      <article class="rb-live-focus">
        <small id="rb-active-label">LIVE</small>
        <div class="rb-signal-icon"></div>
        <h3 id="rb-active-title">Go Live</h3>
        <p id="rb-active-meta">LIVE STREAM</p>
      </article>

    </section>

    <section class="rb-action-row">
      <button id="rb-open-upload" class="rb-side-action" type="button">
        Upload Content
        <small>SHARE YOUR WORLD</small>
      </button>

      <button id="rb-launch-section" class="rb-main-action" type="button">
        ENTER REALITY →
      </button>

      <button id="rb-create-channel" class="rb-side-action" type="button">
        Create Channel
        <small>BUILD YOUR BRAND</small>
      </button>
    </section>

    <nav class="rb-bottom-nav" aria-label="Main sections">
      <button data-route="feed" type="button">⌂<span>Feed</span></button>
      <button data-route="live" type="button" class="active">◉<span>Live</span></button>
      <button data-route="music" type="button">♫<span>Music</span></button>
      <button data-route="gaming" type="button">🎮<span>Games</span></button>
      <button data-route="meta" type="button">◇<span>Meta</span></button>
    </nav>

    <section class="rb-stats-row">
      <div><b id="rb-stat-members">10M+</b><small>MEMBERS</small></div>
      <div><b id="rb-stat-creators">500K+</b><small>CREATORS</small></div>
      <div><b id="rb-stat-live">100K+</b><small>LIVE NOW</small></div>
      <div><b id="rb-stat-active">1M+</b><small>DAILY ACTIVE</small></div>
    </section>

    <footer class="rb-index-footer">
      ONE PLATFORM • ENDLESS POSSIBILITIES
      <small>WELCOME TO RICH BIZNESS UNIVERSE</small>
    </footer>

  </main>

  <script type="module" src="/core/pages/index.js"></script>
</body>
</html>

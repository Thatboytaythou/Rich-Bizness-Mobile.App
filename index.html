<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rich Bizness • Universe</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <style>
    body {
      background: #0a0f0a;
      overflow-x: hidden;
    }
    .burnt-gold { color: #fbbf24; }
    .phone-hub {
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .glass-smoke {
      background: rgba(16, 185, 129, 0.06);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(251, 191, 36, 0.3);
    }
  </style>
</head>
<body class="text-white min-h-screen pb-20">

  <!-- 3D Portal Background -->
  <div id="portal-container" class="fixed inset-0 z-[-1]"></div>

  <div class="max-w-5xl mx-auto px-6 pt-8 relative z-10">

    <!-- Header -->
    <div class="glass-smoke rounded-3xl p-6 flex justify-between items-center mb-12">
      <div>
        <h1 class="text-5xl font-black tracking-tighter">RICH <span class="burnt-gold">BIZNESS</span></h1>
        <p class="text-gray-400">LLC • SMOKE & EMPIRE</p>
      </div>
      <div class="px-6 py-3 bg-emerald-500/10 border border-emerald-500 rounded-full flex items-center gap-3">
        <div class="w-3 h-3 bg-emerald-500 rounded-full animate-pulse"></div>
        <span class="text-sm font-medium">LIVE</span>
      </div>
    </div>

    <!-- PS5-Style Central Hub -->
    <div class="relative h-[680px] flex items-center justify-center mb-16">
      
      <!-- Rotating Portal -->
      <div id="portal" class="absolute w-[520px] h-[520px] border-4 border-emerald-400/40 rounded-full flex items-center justify-center">
        <div class="w-[380px] h-[380px] border border-amber-400/60 rounded-full animate-[spin_25s_linear_infinite]"></div>
      </div>

      <!-- Central Main Phone -->
      <div onclick="goLive()" class="phone-hub relative z-30 w-80">
        <div class="phone-mockup">
          <div class="bg-zinc-950 rounded-3xl h-[520px] flex flex-col items-center justify-center text-center p-8 border border-amber-400/50">
            <div class="w-28 h-28 bg-gradient-to-br from-emerald-400 to-amber-500 rounded-3xl flex items-center justify-center mb-8 shadow-2xl">
              <i class="fa-solid fa-broadcast-tower text-6xl text-black"></i>
            </div>
            <h2 class="text-4xl font-bold mb-2">Go Live</h2>
            <p class="text-emerald-400">ENTER THE SMOKE</p>
          </div>
        </div>
      </div>

      <!-- Sliding Side Phones -->
      <div onclick="selectModule('music')" class="phone-hub absolute left-8 top-40 w-52 scale-75 hover:scale-90 cursor-pointer">
        <div class="phone-mockup">
          <div class="bg-zinc-950 rounded-3xl h-72 flex flex-col items-center justify-center">
            <i class="fa-solid fa-music text-5xl text-purple-400 mb-4"></i>
            <p class="font-bold">Music</p>
          </div>
        </div>
      </div>

      <div onclick="selectModule('gaming')" class="phone-hub absolute left-6 bottom-40 w-52 scale-75 hover:scale-90 cursor-pointer">
        <div class="phone-mockup">
          <div class="bg-zinc-950 rounded-3xl h-72 flex flex-col items-center justify-center">
            <i class="fa-solid fa-gamepad text-5xl text-cyan-400 mb-4"></i>
            <p class="font-bold">Gaming</p>
          </div>
        </div>
      </div>

      <div onclick="selectModule('meta')" class="phone-hub absolute right-8 top-40 w-52 scale-75 hover:scale-90 cursor-pointer">
        <div class="phone-mockup">
          <div class="bg-zinc-950 rounded-3xl h-72 flex flex-col items-center justify-center">
            <i class="fa-solid fa-globe text-5xl text-sky-400 mb-4"></i>
            <p class="font-bold">Meta</p>
          </div>
        </div>
      </div>

      <div onclick="selectModule('store')" class="phone-hub absolute right-6 bottom-40 w-52 scale-75 hover:scale-90 cursor-pointer">
        <div class="phone-mockup">
          <div class="bg-zinc-950 rounded-3xl h-72 flex flex-col items-center justify-center">
            <i class="fa-solid fa-store text-5xl text-amber-400 mb-4"></i>
            <p class="font-bold">Store</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Hero Text -->
    <div class="text-center mb-16">
      <h2 class="text-6xl font-black tracking-tighter">ALL IN ONE <span class="burnt-gold">UNIVERSE</span></h2>
      <p class="text-emerald-400 text-2xl mt-4">SMOKE • POWER • LEGACY</p>
    </div>

    <!-- Stats -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
      <div class="glass-smoke rounded-3xl p-6 text-center"><div class="text-4xl font-bold text-emerald-400">10M+</div><div class="text-gray-400">Members</div></div>
      <div class="glass-smoke rounded-3xl p-6 text-center"><div class="text-4xl font-bold text-emerald-400">500K+</div><div class="text-gray-400">Creators</div></div>
      <div class="glass-smoke rounded-3xl p-6 text-center"><div class="text-4xl font-bold text-emerald-400">100K+</div><div class="text-gray-400">Live Now</div></div>
      <div class="glass-smoke rounded-3xl p-6 text-center"><div class="text-4xl font-bold text-emerald-400">∞</div><div class="text-gray-400">Realms</div></div>
    </div>
  </div>

  <script>
    // Rotating Portal with Galaxy
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('portal-container').appendChild(renderer.domElement);

    const portal = new THREE.Mesh(
      new THREE.SphereGeometry(13, 64, 64),
      new THREE.MeshPhongMaterial({ 
        color: 0x10b981, 
        emissive: 0x064e3b,
        shininess: 20 
      })
    );
    scene.add(portal);

    // Stars / Smoke Particles
    const starsGeo = new THREE.BufferGeometry();
    const positions = [];
    for (let i = 0; i < 6000; i++) {
      positions.push(THREE.MathUtils.randFloatSpread(300));
      positions.push(THREE.MathUtils.randFloatSpread(300));
      positions.push(THREE.MathUtils.randFloatSpread(300));
    }
    starsGeo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
    const stars = new THREE.Points(starsGeo, new THREE.PointsMaterial({color: 0xfacc15, size: 0.1}));
    scene.add(stars);

    scene.add(new THREE.AmbientLight(0xffffff, 0.5));
    const light = new THREE.PointLight(0xfacc15, 3);
    light.position.set(40, 30, 50);
    scene.add(light);

    camera.position.z = 38;

    function animate() {
      requestAnimationFrame(animate);
      portal.rotation.y += 0.0015;
      stars.rotation.y += 0.0004;
      renderer.render(scene, camera);
    }
    animate();

    function goLive() { alert("🌫️ Entering the Smoke Portal..."); }
    function selectModule(mod) { alert(`Entering ${mod.toUpperCase()} Realm...`); }
  </script>
</body>
</html>

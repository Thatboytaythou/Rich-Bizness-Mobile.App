<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rich Bizness • Universe</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { background: #0a0f0a; }
    .glow-green { box-shadow: 0 0 70px -15px #00ff9d; }
    .phone-mockup {
      background: #111;
      border: 12px solid #00ff9d;
      border-radius: 48px;
      padding: 12px;
      box-shadow: 0 0 60px -10px #00ff9d;
      transition: all 0.4s ease;
    }
    .phone-mockup:hover { transform: scale(1.08); }
  </style>
</head>
<body class="text-white min-h-screen pb-20">

  <div class="max-w-6xl mx-auto px-6 pt-8">

    <!-- Header -->
    <div class="flex justify-between items-center mb-8">
      <div>
        <h1 class="text-5xl font-black tracking-tighter">RICH <span class="text-[#00ff9d]">BIZNESS</span></h1>
        <p class="text-gray-400">LLC • ALL IN ONE UNIVERSE</p>
      </div>
      <div class="flex items-center gap-4">
        <div class="px-4 py-2 bg-green-500/10 border border-green-500 rounded-full text-sm flex items-center gap-2">
          <div class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></div>
          LIVE
        </div>
      </div>
    </div>

    <!-- Multiple Phones Container -->
    <div class="relative h-[620px] flex items-center justify-center mb-12 overflow-hidden">
      <!-- Background Rings -->
      <div class="absolute w-[520px] h-[520px] border border-green-500/20 rounded-full animate-[spin_50s_linear_infinite]"></div>
      <div class="absolute w-[620px] h-[620px] border border-green-500/10 rounded-full animate-[spin_70s_linear_infinite]"></div>

      <!-- Central Big Phone -->
      <div class="phone-mockup w-72 relative z-20">
        <div class="bg-black rounded-3xl h-[520px] flex flex-col items-center justify-center text-center">
          <div class="w-24 h-24 bg-gradient-to-br from-green-400 to-emerald-600 rounded-2xl flex items-center justify-center mb-6 glow-green">
            <i class="fa-solid fa-broadcast-tower text-5xl"></i>
          </div>
          <h3 class="text-2xl font-bold">Go Live</h3>
          <p class="text-green-400">ENTER THE UNIVERSE</p>
        </div>
      </div>

      <!-- Orbiting Small Phones -->
      <div class="absolute top-12 left-12 phone-mockup w-44 scale-75">
        <div class="bg-black rounded-3xl h-80 flex flex-col items-center justify-center text-center p-4">
          <i class="fa-solid fa-gamepad text-4xl text-cyan-400 mb-4"></i>
          <p class="font-bold text-sm">Gaming</p>
        </div>
      </div>

      <div class="absolute top-20 right-16 phone-mockup w-44 scale-75">
        <div class="bg-black rounded-3xl h-80 flex flex-col items-center justify-center text-center p-4">
          <i class="fa-solid fa-globe text-4xl text-sky-400 mb-4"></i>
          <p class="font-bold text-sm">Meta</p>
        </div>
      </div>

      <div class="absolute bottom-16 left-20 phone-mockup w-44 scale-75">
        <div class="bg-black rounded-3xl h-80 flex flex-col items-center justify-center text-center p-4">
          <i class="fa-solid fa-music text-4xl text-purple-400 mb-4"></i>
          <p class="font-bold text-sm">Music</p>
        </div>
      </div>

      <div class="absolute bottom-12 right-12 phone-mockup w-44 scale-75">
        <div class="bg-black rounded-3xl h-80 flex flex-col items-center justify-center text-center p-4">
          <i class="fa-solid fa-store text-4xl text-amber-400 mb-4"></i>
          <p class="font-bold text-sm">Store</p>
        </div>
      </div>
    </div>

    <!-- Hero Text -->
    <div class="text-center mb-12">
      <h2 class="text-5xl font-bold">ALL IN ONE <span class="text-[#00ff9d]">UNIVERSE</span></h2>
      <p class="text-[#00ff9d] text-xl mt-3">CONNECT • CREATE • EARN</p>
    </div>

    <!-- Stats -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-16">
      <div class="bg-zinc-900 rounded-3xl p-6 text-center"><div class="text-4xl font-bold text-green-400">10M+</div><div class="text-gray-400">Members</div></div>
      <div class="bg-zinc-900 rounded-3xl p-6 text-center"><div class="text-4xl font-bold text-green-400">500K+</div><div class="text-gray-400">Creators</div></div>
      <div class="bg-zinc-900 rounded-3xl p-6 text-center"><div class="text-4xl font-bold text-green-400">100K+</div><div class="text-gray-400">Live Now</div></div>
      <div class="bg-zinc-900 rounded-3xl p-6 text-center"><div class="text-4xl font-bold text-green-400">∞</div><div class="text-gray-400">Modules</div></div>
    </div>

    <!-- 3D Schema -->
    <div class="bg-zinc-950 rounded-3xl p-6 border border-green-500/30">
      <h3 class="text-xl font-bold mb-4 text-center text-[#00ff9d]">3D DATABASE SCHEMA</h3>
      <div id="three-container" class="w-full h-96 rounded-2xl overflow-hidden"></div>
    </div>

  </div>

  <!-- Three.js 3D Graph -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script>
    // (Same 3D schema code from before - abbreviated for brevity)
    // You can paste the full 3D script from previous response here if needed
  </script>
</body>
</html>

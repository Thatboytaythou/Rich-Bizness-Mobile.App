<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />

  <title>RB Base No Image Test</title>

  <link rel="stylesheet" href="/styles/base.css" />
</head>

<body class="rb-base-test-page">

  <main class="rb-base-test-shell">

    <section class="rb-base-test-card">

      <div class="rb-base-test-icon" id="profileBtn">
        👤
      </div>

      <h1>RICH <span>BIZNESS</span></h1>

      <p>BASE STYLE TEST • NO IMAGE</p>

      <button id="signBtn" type="button">
        Sign In
      </button>

    </section>

  </main>

  <script type="module">
    const profileBtn = document.getElementById("profileBtn");
    const signBtn = document.getElementById("signBtn");

    function pulse(el) {
      if (!el) return;

      el.animate(
        [
          { transform: "scale(1)" },
          { transform: "scale(.92)" },
          { transform: "scale(1)" }
        ],
        {
          duration: 220,
          easing: "ease"
        }
      );
    }

    profileBtn?.addEventListener("click", () => {
      pulse(profileBtn);
      console.log("Profile clicked");
    });

    signBtn?.addEventListener("click", () => {
      pulse(signBtn);
      signBtn.textContent =
        signBtn.textContent === "Sign In"
          ? "ThatboyTayThou"
          : "Sign In";
    });
  </script>

</body>
</html>

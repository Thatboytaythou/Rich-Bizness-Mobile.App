<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rich Bizness • Universe</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body {
      background: #0a0f0a;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .glow-green {
      box-shadow: 0 0 60px -10px rgb(0 255 157);
    }
    .orbit-container {
      position: relative;
      width: 320px;
      height: 320px;
    }
    .feature-card {
      position: absolute;
      width: 90px;
      transition: all 0.4s ease;
    }
  </style>
</head>
<body class="min-h-screen text-white pb-20">

  <!-- Header -->
  <header class="fixed top-0 left-0 right-0 z-50 bg-black/90 backdrop-blur-lg border-b border-green-500/20">
    <div class="max-w-xl mx-auto px-6 py-4 flex items-center justify-between">
      <div>
        <h1 class="text-3xl font-black tracking-tighter">RICH <span class="text-[#00ff9d]">BIZNESS</span></h1>
        <p class="text-xs text-gray-500 -mt-1">LLC</p>
      </div>
      <div class="flex items-center gap-3">
        <div class="px-4 py-2 bg-zinc-900 rounded-full text-sm flex items-center gap-2 border border-green-500/30">
          <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
          Guest Mode
        </div>
      </div>
    </div>
  </header>

  <main class="pt-24 max-w-xl mx-auto px-6">

    <!-- Hero -->
    <div class="text-center mb-10">
      <p class="uppercase text-xs tracking-[3px] text-gray-400 mb-3">EVERYTHING YOU NEED</p>
      <h2 class="text-5xl md:text-6xl font-bold leading-none mb-4">
        ALL IN ONE <span class="text-[#00ff9d]">UNIVERSE</span>
      </h2>
      <p class="text-[#00ff9d] tracking-widest text-lg">CONNECT • CREATE • EARN</p>
    </div>

    <!-- Mode Tabs -->
    <div class="flex justify-center gap-2 mb-10 overflow-x-auto pb-2 hide-scroll">
      <button onclick="switchMode('live')" class="mode-btn active px-8 py-3 rounded-full border border-green-500 bg-green-500/10 text-white font-medium">LIVE</button>
      <button onclick="switchMode('gaming')" class="mode-btn px-8 py-3 rounded-full border border-white/10 hover:border-white/30">GAMING</button>
      <button onclick="switchMode('meta')" class="mode-btn px-8 py-3 rounded-full border border-white/10 hover:border-white/30">META</button>
    </div>

    <!-- Central Orb Area -->
    <div class="relative flex justify-center mb-12">
      <div class="orbit-container">
        <!-- Background Glow -->
        <div class="absolute inset-0 bg-gradient-to-br from-green-500/20 to-transparent rounded-full blur-3xl"></div>

        <!-- Central Phone / Go Live -->
        <div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 z-20">
          <div id="central-phone" class="w-64 bg-black rounded-3xl p-3 border-4 border-green-500 glow-green">
            <div class="bg-zinc-950 rounded-2xl h-96 flex flex-col items-center justify-center text-center relative overflow-hidden">
              <div class="w-20 h-20 bg-gradient-to-br from-green-400 to-emerald-600 rounded-full flex items-center justify-center mb-4">
                <i class="fa-solid fa-broadcast-tower text-3xl"></i>
              </div>
              <h3 class="font-bold text-xl">Go Live</h3>
              <p class="text-green-400 text-sm">LIVE STREAM</p>
            </div>
          </div>
        </div>

        <!-- Orbiting Cards -->
        <div id="orbiting-cards" class="absolute inset-0"></div>
      </div>
    </div>

    <!-- Action Buttons -->
    <div class="space-y-4 px-2">
      <button onclick="uploadContent()" class="w-full bg-zinc-900 hover:bg-zinc-800 border border-white/10 rounded-3xl p-6 text-left transition">
        <div class="font-semibold text-lg">Upload Content</div>
        <div class="text-sm text-gray-400">SHARE YOUR WORLD</div>
      </button>

      <button onclick="enterUniverse()" id="main-cta-button"
        class="w-full py-7 text-2xl font-bold rounded-3xl bg-gradient-to-r from-[#00ff9d] to-[#a3ff00] text-black shadow-lg shadow-green-500/50">
        ENTER LIVE →
      </button>

      <button onclick="createChannel()" class="w-full bg-zinc-900 hover:bg-zinc-800 border border-white/10 rounded-3xl p-6 text-left transition">
        <div class="font-semibold text-lg">Create Channel</div>
        <div class="text-sm text-gray-400">BUILD YOUR BRAND</div>
      </button>
    </div>

    <!-- Stats -->
    <div class="mt-16 grid grid-cols-2 gap-y-8 text-center">
      <div>
        <div class="text-3xl font-bold text-green-400">10M+</div>
        <div class="text-xs uppercase tracking-widest text-gray-500">Members</div>
      </div>
      <div>
        <div class="text-3xl font-bold text-green-400">500K+</div>
        <div class="text-xs uppercase tracking-widest text-gray-500">Creators</div>
      </div>
      <div>
        <div class="text-3xl font-bold text-green-400">100K+</div>
        <div class="text-xs uppercase tracking-widest text-gray-500">Live Now</div>
      </div>
      <div>
        <div class="text-3xl font-bold text-green-400">1M+</div>
        <div class="text-xs uppercase tracking-widest text-gray-500">Daily Active</div>
      </div>
    </div>

  </main>

  <script>
    function switchMode(mode) {
      document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active', 'border-green-500', 'bg-green-500/10'));
      
      const buttons = document.querySelectorAll('.mode-btn');
      if (mode === 'live') buttons[0].classList.add('active', 'border-green-500', 'bg-green-500/10');
      else if (mode === 'gaming') buttons[1].classList.add('active', 'border-green-500', 'bg-green-500/10');
      else buttons[2].classList.add('active', 'border-green-500', 'bg-green-500/10');

      const cta = document.getElementById('main-cta-button');
      if (mode === 'live') {
        cta.textContent = 'ENTER LIVE →';
        cta.style.backgroundImage = 'linear-gradient(to right, #00ff9d, #a3ff00)';
      } else if (mode === 'gaming') {
        cta.textContent = 'ENTER GAMING →';
        cta.style.backgroundImage = 'linear-gradient(to right, #22d3ee, #67e8f9)';
      } else {
        cta.textContent = 'ENTER META →';
        cta.style.backgroundImage = 'linear-gradient(to right, #c084fc, #67e8f9)';
      }
    }

    function uploadContent() {
      alert("Upload Content flow would go here");
    }
    function createChannel() {
      alert("Create Channel flow would go here");
    }
    function enterUniverse() {
      alert("Welcome to the Rich Bizness Universe!");
    }

    // Initialize orbiting cards (simplified)
    function initOrbit() {
      const container = document.getElementById('orbiting-cards');
      const labels = ['Global Feed', 'The Store', 'Gaming', 'Music'];
      // You can replace this with actual images later
      container.innerHTML = `
        <div class="feature-card" style="top: 10%; left: 10%; transform: rotate(-25deg);">
          <img src="https://via.placeholder.com/90x140/111827/00ff9d?text=Feed" class="rounded-2xl shadow-xl">
        </div>
        <div class="feature-card" style="top: 15%; right: 5%; transform: rotate(15deg);">
          <img src="https://via.placeholder.com/90x140/111827/00ff9d?text=Store" class="rounded-2xl shadow-xl">
        </div>
      `;
    }

    window.onload = initOrbit;
  </script>
</body>
</html>

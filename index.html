<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rich Bizness • Universe</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <style>
    body { background: #0a0f0a; overflow-x: hidden; }
    #globe-container, #character-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
    .glow-green { box-shadow: 0 0 100px -20px #00ff9d; }
    .phone-mockup {
      background: #111;
      border: 14px solid #00ff9d;
      border-radius: 52px;
      padding: 10px;
      box-shadow: 0 0 80px -15px #00ff9d;
      transition: all 0.4s ease;
      cursor: pointer;
    }
  </style>
</head>
<body class="text-white min-h-screen pb-20">

  <!-- Globe Background -->
  <div id="globe-container"></div>

  <!-- Character Canvas -->
  <div id="character-container" class="opacity-90"></div>

  <div class="max-w-6xl mx-auto px-6 pt-8 relative z-10">

    <!-- Header -->
    <div class="flex justify-between items-center mb-8">
      <div>
        <h1 class="text-5xl font-black tracking-tighter">RICH <span class="text-[#00ff9d]">BIZNESS</span></h1>
        <p class="text-gray-400">LLC • EMPIRE OF THE UNIVERSE</p>
      </div>
      <div class="flex items-center gap-4">
        <div class="px-4 py-2 bg-green-500/10 border border-green-500 rounded-full text-sm flex items-center gap-2">
          <div class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></div>
          LIVE
        </div>
      </div>
    </div>

    <!-- Cinematic Hero -->
    <div class="relative h-[580px] flex items-center justify-center mb-12 rounded-3xl overflow-hidden">
      <div class="absolute inset-0 bg-gradient-to-b from-transparent via-black/60 to-black/90"></div>
      
      <div class="relative z-10 text-center">
        <h2 class="text-6xl font-black tracking-tighter mb-4">ALL IN ONE <span class="text-[#00ff9d]">UNIVERSE</span></h2>
        <p class="text-[#00ff9d] text-2xl">CONNECT • CREATE • CONQUER</p>
      </div>

      <!-- Central Phone -->
      <div onclick="goLive()" class="phone-mockup w-72 absolute bottom-12 left-1/2 -translate-x-1/2 z-20">
        <div class="bg-black rounded-3xl h-[520px] flex flex-col items-center justify-center text-center p-6">
          <div class="w-28 h-28 bg-gradient-to-br from-green-400 to-emerald-600 rounded-3xl flex items-center justify-center mb-8 glow-green">
            <i class="fa-solid fa-broadcast-tower text-6xl"></i>
          </div>
          <h2 class="text-3xl font-bold mb-2">Go Live</h2>
          <p class="text-green-400">ENTER THE EMPIRE</p>
        </div>
      </div>
    </div>

    <!-- Stats -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-16">
      <div class="bg-zinc-900/80 rounded-3xl p-6 text-center"><div class="text-4xl font-bold text-green-400">10M+</div><div class="text-gray-400">Members</div></div>
      <div class="bg-zinc-900/80 rounded-3xl p-6 text-center"><div class="text-4xl font-bold text-green-400">500K+</div><div class="text-gray-400">Creators</div></div>
      <div class="bg-zinc-900/80 rounded-3xl p-6 text-center"><div class="text-4xl font-bold text-green-400">100K+</div><div class="text-gray-400">Live Now</div></div>
      <div class="bg-zinc-900/80 rounded-3xl p-6 text-center"><div class="text-4xl font-bold text-green-400">∞</div><div class="text-gray-400">Modules</div></div>
    </div>

    <!-- Module Phones -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
      <div onclick="selectModule('music')" class="phone-mockup"><div class="bg-black rounded-3xl h-64 flex flex-col items-center justify-center"><i class="fa-solid fa-music text-5xl text-purple-400"></i><p class="mt-4 font-bold">Music</p></div></div>
      <div onclick="selectModule('gaming')" class="phone-mockup"><div class="bg-black rounded-3xl h-64 flex flex-col items-center justify-center"><i class="fa-solid fa-gamepad text-5xl text-cyan-400"></i><p class="mt-4 font-bold">Gaming</p></div></div>
      <div onclick="selectModule('meta')" class="phone-mockup"><div class="bg-black rounded-3xl h-64 flex flex-col items-center justify-center"><i class="fa-solid fa-globe text-5xl text-sky-400"></i><p class="mt-4 font-bold">Meta</p></div></div>
      <div onclick="selectModule('store')" class="phone-mockup"><div class="bg-black rounded-3xl h-64 flex flex-col items-center justify-center"><i class="fa-solid fa-store text-5xl text-amber-400"></i><p class="mt-4 font-bold">Store</p></div></div>
    </div>
  </div>

  <script>
    // === GLOBE BACKGROUND ===
    const globeScene = new THREE.Scene();
    const globeCamera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
    const globeRenderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    globeRenderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('globe-container').appendChild(globeRenderer.domElement);

    const globe = new THREE.Mesh(new THREE.SphereGeometry(9, 64, 64), new THREE.MeshPhongMaterial({color: 0x00ff9d, emissive: 0x004422}));
    globeScene.add(globe);
    globeScene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const light = new THREE.PointLight(0x00ff9d, 2.5);
    light.position.set(25, 20, 30);
    globeScene.add(light);
    globeCamera.position.z = 28;

    // === REALISTIC 3D CHARACTER ===
    const charScene = new THREE.Scene();
    const charCamera = new THREE.PerspectiveCamera(45, 300/400, 0.1, 1000);
    const charRenderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    charRenderer.setSize(300, 400);
    document.getElementById('character-container').appendChild(charRenderer.domElement);

    // Hooded Character
    const characterGroup = new THREE.Group();

    // Body (Hoodie)
    const bodyGeo = new THREE.BoxGeometry(4, 7, 3);
    const bodyMat = new THREE.MeshPhongMaterial({ color: 0x1a1a1a });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.position.y = 2;
    characterGroup.add(body);

    // Head
    const headGeo = new THREE.SphereGeometry(2.2, 32, 32);
    const headMat = new THREE.MeshPhongMaterial({ color: 0xffdbac });
    const head = new THREE.Mesh(headGeo, headMat);
    head.position.y = 6.5;
    characterGroup.add(head);

    // Beanie
    const beanieGeo = new THREE.CylinderGeometry(2.1, 1.8, 2, 32);
    const beanieMat = new THREE.MeshPhongMaterial({ color: 0x1e3a2f });
    const beanie = new THREE.Mesh(beanieGeo, beanieMat);
    beanie.position.y = 8;
    beanie.rotation.x = Math.PI / 2;
    characterGroup.add(beanie);

    // Arms
    const armGeo = new THREE.BoxGeometry(1.2, 4, 1.2);
    const leftArm = new THREE.Mesh(armGeo, bodyMat);
    leftArm.position.set(-2.5, 3, 0);
    leftArm.rotation.z = 0.6;
    characterGroup.add(leftArm);

    const rightArm = leftArm.clone();
    rightArm.position.x = 2.5;
    rightArm.rotation.z = -0.6;
    characterGroup.add(rightArm);

    charScene.add(characterGroup);
    charScene.add(new THREE.AmbientLight(0xffffff, 0.8));
    const charLight = new THREE.PointLight(0x00ff9d, 1.5);
    charLight.position.set(10, 15, 20);
    charScene.add(charLight);

    charCamera.position.set(0, 5, 15);
    charCamera.lookAt(0, 5, 0);

    function animate() {
      requestAnimationFrame(animate);
      
      // Globe
      globe.rotation.y += 0.0015;
      globeRenderer.render(globeScene, globeCamera);

      // Character subtle animation
      characterGroup.rotation.y = Math.sin(Date.now() * 0.0008) * 0.08;
      charRenderer.render(charScene, charCamera);
    }
    animate();

    // Interactions
    function goLive() { alert("🚀 Launching Live Stream Studio..."); }
    function selectModule(mod) {
      const map = { music: "🎵 Music Universe", gaming: "🎮 Gaming District", meta: "🌌 Meta World", store: "🛍️ Creator Market" };
      alert(`Entering ${map[mod]}...`);
    }
  </script>
</body>
</html>

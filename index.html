<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <title>Rich Bizness • Universe</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />

  <link rel="stylesheet" href="/styles/base.css" />
  <link rel="stylesheet" href="/styles/omni-fx.css" />
  <link rel="stylesheet" href="/styles/three.css" />
  <link rel="stylesheet" href="/styles/omni-portal.css" />
  <link rel="stylesheet" href="/styles/omni-dial.css" />
</head>

<body class="rb-index-page">
  <div class="rb-bg-grid"></div>
  <div class="rb-bg-vignette"></div>
  <div class="rb-bg-noise"></div>
  <div class="rb-fx-smoke"></div>

  <div id="portal-container" aria-hidden="true"></div>

  <main class="rb-shell">
    <header class="rb-header glass-smoke">
      <div class="rb-brand-wrap">
        <h1 class="rb-title">RICH <span class="burnt-gold">BIZNESS</span></h1>
        <p class="rb-subtitle">LLC • SMOKE &amp; EMPIRE</p>
      </div>

      <button class="rb-live-pill" type="button" data-route="live">
        <span class="rb-live-dot"></span>
        LIVE
      </button>
    </header>

    <section class="rb-hub" aria-label="Rich Bizness universe hub">
      <div class="rb-universe-core">
        <div class="rb-portal-energy"></div>
      </div>

      <div class="rb-orbit-system">
        <div class="rb-orbit-track track-main">

          <button class="rb-phone-card orbit-feed" type="button" data-route="feed">
            <div class="rb-phone-screen">
              <div class="rb-screen-overlay"></div>
              <div class="rb-screen-top">
                <span class="rb-screen-pill">Feed</span>
                <span class="rb-live-dot-mini"></span>
              </div>
              <div class="rb-screen-info">
                <div class="rb-screen-title">Feed</div>
                <div class="rb-screen-sub">Home Stream</div>
              </div>
            </div>
          </button>

          <button class="rb-phone-card orbit-music" type="button" data-route="music">
            <div class="rb-phone-screen">
              <div class="rb-screen-overlay"></div>
              <div class="rb-screen-top">
                <span class="rb-screen-pill">Music</span>
                <span class="rb-live-dot-mini"></span>
              </div>
              <div class="rb-screen-info">
                <div class="rb-screen-title">Music</div>
                <div class="rb-screen-sub">Tracks</div>
              </div>
            </div>
          </button>

          <button class="rb-phone-card orbit-live" type="button" data-route="live">
            <div class="rb-phone-screen">
              <div class="rb-screen-overlay"></div>
              <div class="rb-screen-top">
                <span class="rb-screen-pill">Live</span>
                <span class="rb-live-dot-mini"></span>
              </div>
              <div class="rb-screen-info">
                <div class="rb-screen-title">Live</div>
                <div class="rb-screen-sub">Go Live</div>
              </div>
            </div>
          </button>

          <button class="rb-phone-card orbit-gallery" type="button" data-route="gallery">
            <div class="rb-phone-screen">
              <div class="rb-screen-overlay"></div>
              <div class="rb-screen-top">
                <span class="rb-screen-pill">Gallery</span>
                <span class="rb-live-dot-mini"></span>
              </div>
              <div class="rb-screen-info">
                <div class="rb-screen-title">Gallery</div>
                <div class="rb-screen-sub">Media</div>
              </div>
            </div>
          </button>

          <button class="rb-phone-card orbit-podcast" type="button" data-route="podcast">
            <div class="rb-phone-screen">
              <div class="rb-screen-overlay"></div>
              <div class="rb-screen-top">
                <span class="rb-screen-pill">Podcast</span>
                <span class="rb-live-dot-mini"></span>
              </div>
              <div class="rb-screen-info">
                <div class="rb-screen-title">Podcast</div>
                <div class="rb-screen-sub">Shows</div>
              </div>
            </div>
          </button>

          <button class="rb-phone-card orbit-radio" type="button" data-route="radio">
            <div class="rb-phone-screen">
              <div class="rb-screen-overlay"></div>
              <div class="rb-screen-top">
                <span class="rb-screen-pill">Radio</span>
                <span class="rb-live-dot-mini"></span>
              </div>
              <div class="rb-screen-info">
                <div class="rb-screen-title">Radio</div>
                <div class="rb-screen-sub">Stations</div>
              </div>
            </div>
          </button>

          <button class="rb-phone-card orbit-gaming" type="button" data-route="gaming">
            <div class="rb-phone-screen">
              <div class="rb-screen-overlay"></div>
              <div class="rb-screen-top">
                <span class="rb-screen-pill">Gaming</span>
                <span class="rb-live-dot-mini"></span>
              </div>
              <div class="rb-screen-info">
                <div class="rb-screen-title">Gaming</div>
                <div class="rb-screen-sub">Arcade</div>
              </div>
            </div>
          </button>

          <button class="rb-phone-card orbit-upload" type="button" data-route="upload">
            <div class="rb-phone-screen">
              <div class="rb-screen-overlay"></div>
              <div class="rb-screen-top">
                <span class="rb-screen-pill">Upload</span>
                <span class="rb-live-dot-mini"></span>
              </div>
              <div class="rb-screen-info">
                <div class="rb-screen-title">Upload</div>
                <div class="rb-screen-sub">Drop Content</div>
              </div>
            </div>
          </button>

          <button class="rb-phone-card orbit-sports" type="button" data-route="sports">
            <div class="rb-phone-screen">
              <div class="rb-screen-overlay"></div>
              <div class="rb-screen-top">
                <span class="rb-screen-pill">Sports</span>
                <span class="rb-live-dot-mini"></span>
              </div>
              <div class="rb-screen-info">
                <div class="rb-screen-title">Sports</div>
                <div class="rb-screen-sub">Zone</div>
              </div>
            </div>
          </button>

          <button class="rb-phone-card orbit-store" type="button" data-route="store">
            <div class="rb-phone-screen">
              <div class="rb-screen-overlay"></div>
              <div class="rb-screen-top">
                <span class="rb-screen-pill">Store</span>
                <span class="rb-live-dot-mini"></span>
              </div>
              <div class="rb-screen-info">
                <div class="rb-screen-title">Store</div>
                <div class="rb-screen-sub">Market</div>
              </div>
            </div>
          </button>

          <button class="rb-phone-card orbit-meta" type="button" data-route="meta">
            <div class="rb-phone-screen">
              <div class="rb-screen-overlay"></div>
              <div class="rb-screen-top">
                <span class="rb-screen-pill">Meta</span>
                <span class="rb-live-dot-mini"></span>
              </div>
              <div class="rb-screen-info">
                <div class="rb-screen-title">Meta</div>
                <div class="rb-screen-sub">World</div>
              </div>
            </div>
          </button>

        </div>
      </div>

      <aside class="rb-side-tabs left">
        <button class="rb-side-tab" type="button" data-route="profile"><i class="fa-solid fa-user"></i> Profile</button>
      </aside>

      <aside class="rb-side-tabs right">
        <button class="rb-side-tab" type="button" data-route="admin"><i class="fa-solid fa-shield-halved"></i> Admin</button>
        <button class="rb-side-tab" type="button" data-route="creator"><i class="fa-solid fa-crown"></i> Creator</button>
        <button class="rb-side-tab" type="button" data-route="watch"><i class="fa-solid fa-tv"></i> Watch</button>
        <button class="rb-side-tab" type="button" data-route="notifications"><i class="fa-solid fa-bell"></i> Alerts</button>
        <button class="rb-side-tab" type="button" data-route="settings"><i class="fa-solid fa-gear"></i> Settings</button>
        <button class="rb-side-tab" type="button" data-route="edit"><i class="fa-solid fa-pen-nib"></i> Edit</button>
        <button class="rb-side-tab" type="button" data-route="messages"><i class="fa-solid fa-comments"></i> Messages</button>
      </aside>
    </section>

    <section class="rb-hero-text">
      <h2 class="rb-hero-title">ALL IN ONE <span class="burnt-gold">UNIVERSE</span></h2>
      <p class="rb-hero-tag">SMOKE • POWER • LEGACY</p>
    </section>

    <button class="rb-enter-btn" type="button" data-route="live">
      ENTER THE PORTAL
    </button>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="/core/engine/universe-preview.js"></script>
  <script src="/core/pages/index.js"></script>
</body>
</html>
